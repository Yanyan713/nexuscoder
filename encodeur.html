<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NexusCoder</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            min-height: 100vh;
            padding: 40px 20px;
            font-size: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(30, 41, 59, 0.85);
            padding: 45px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        h2 {
            font-size: 34px;
            text-align: center;
            margin-bottom: 35px;
            color: #38bdf8;
            letter-spacing: 2px;
            font-weight: 700;
        }
        #txtPass {
            width: 100%;
            font-size: 22px;
            padding: 16px 20px;
            background: #1e293b;
            border: 2px solid #334155;
            color: #f1f5f9;
            border-radius: 12px;
            margin-bottom: 30px;
            outline: none;
            transition: all 0.3s ease;
        }
        #txtPass:focus{
            border-color: #38bdf8;
            box-shadow: 0 0 12px rgba(56,189,248,0.25);
        }
        .btn-group{
            display:flex;
            gap:20px;
            flex-wrap:wrap;
            margin-bottom:30px;
        }
        button {
            font-size: 21px;
            padding: 15px 36px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37,99,235,0.3);
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 22px rgba(37,99,235,0.45);
            background: linear-gradient(135deg, #3b7af0, #2557e0);
        }
        #zoneResult {
            margin-top: 20px;
            padding: 28px;
            background: #0f172a;
            font-size: 21px;
            border-radius: 14px;
            border:1px solid rgba(255,255,255,0.08);
            line-height:1.6;
        }
        canvas {
            border: 2px solid #334155;
            background: #000000;
            margin-top: 30px;
            border-radius:12px;
            box-shadow:0 8px 25px rgba(0,0,0,0.5);
        }
        #fileImg {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>NEXUSCODER</h2>
        <input type="text" id="txtPass" placeholder="Enter your password">
        <div class="btn-group">
            <button onclick="createEncryptedImage()">GENERATE ENCRYPTED IMAGE</button>
            <button onclick="selectImageFile()">DECRYPT AN IMAGE</button>
        </div>
        <input type="file" id="fileImg" accept="image/png" onchange="loadImageFile(event)">

        <div id="zoneResult">READY STATE</div>
        <canvas id="canvImage" width="750" height="550"></canvas>
    </div>

<script>
const colorMap = {
    a:"#0A3372",b:"#124A8C",c:"#1A61A6",d:"#2278C0",e:"#2A8FDA",
    f:"#33A6F4",g:"#47B0F5",h:"#5CB9F6",i:"#70C2F7",j:"#85CBF8",
    k:"#99D4F9",l:"#ADDCFA",m:"#C2E5FB",n:"#D6EEFC",o:"#EBF7FD",
    p:"#720A33",q:"#8C124A",r:"#A61A61",s:"#C02278",t:"#DA2A8F",
    u:"#F433A6",v:"#F547B0",w:"#F65CB9",x:"#F770C2",y:"#F885CB",
    z:"#F999D4",
    0:"#33720A",1:"#4A8C12",2:"#61A61A",3:"#78C022",4:"#8FDA2A",
    5:"#A6F433",6:"#B0F547",7:"#B9F65C",8:"#C2F770",9:"#CBF885",
    "!":"#ff2222","@":"#ff8800","#":"#ffff22","$":"#22ff22","%":"#2288ff",
    "^":"#8822ff","&":"#ff22aa","*":"#aaaaaa","(":"#777777",")":"#555555",
    "-":"#4488dd","_":"#8844dd","=":"#dd4488","+":"#44dd88","`":"#333366",
    "~":"#663333",",":"#225544",".":"#552244","<":"#442255",">":"#224455",
    "/":"#996633","?":"#669933",";":"#336699",":":"#993369","'":"#779922",
    "\"":"#227799","[":"#aa5522","]":"#22aa55","{":"#5522aa","}":"#aa2255"
};

const charMap = {};
for (const [char, hex] of Object.entries(colorMap)) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    charMap[`${r},${g},${b}`] = char;
}

const squareSize = 14;
const gap = 6;
const startX = 15;
const startY = 15;

function create10CharCode(){
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    let code = "";
    for(let i=0;i<10;i++){
        code += chars[Math.floor(Math.random()*chars.length)];
    }
    return code;
}

function drawEncryptedImage(password){
    const canvas = document.getElementById("canvImage");
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#000000";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const charList = password.split("");
    let index = 0;
    for(let row=0;row<10;row++){
        for(let col=0;col<10;col++){
            const x = startX + col * (squareSize + gap);
            const y = startY + row * (squareSize + gap);
            if(index < charList.length && colorMap[charList[index]]){
                ctx.fillStyle = colorMap[charList[index]];
            } else {
                const r = Math.random();
                ctx.fillStyle = r > 0.85 ? "#333333" : r > 0.6 ? "#222222" : "#111111";
            }
            ctx.fillRect(x, y, squareSize, squareSize);
            index++;
        }
    }
}

function downloadPNG(){
    const canvas = document.getElementById("canvImage");
    const link = document.createElement("a");
    link.href = canvas.toDataURL("image/png");
    link.download = "nexuscoder_encrypted.png";
    link.click();
}

function createEncryptedImage(){
    const pass = document.getElementById("txtPass").value.trim();
    if(!pass){
        document.getElementById("zoneResult").innerText = "PLEASE ENTER A PASSWORD";
        return;
    }
    const shortCode = create10CharCode();
    drawEncryptedImage(pass);
    document.getElementById("zoneResult").innerText =
    "ENCODING SUCCESS\nUNIQUE 10 CHARACTER CODE : " + shortCode +
    "\nSame password = same image, different code every time\nSupports letters, numbers & all common symbols";
    setTimeout(downloadPNG, 600);
}

function selectImageFile(){
    document.getElementById("fileImg").click();
}

function loadImageFile(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){
        const img = new Image();
        img.onload = function(){
            const canvas = document.getElementById("canvImage");
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            let password = "";
            let index = 0;
            for(let row=0;row<10;row++){
                for(let col=0;col<10;col++){
                    const x = startX + col * (squareSize + gap) + squareSize / 2;
                    const y = startY + row * (squareSize + gap) + squareSize / 2;
                    const pixel = ctx.getImageData(x, y, 1, 1).data;
                    const key = `${pixel[0]},${pixel[1]},${pixel[2]}`;
                    if (charMap[key]) password += charMap[key];
                    index++;
                }
            }
            document.getElementById("zoneResult").innerText = "DECRYPTED PASSWORD : " + password;
        };
        img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
}
</script>
</body>
</html>
